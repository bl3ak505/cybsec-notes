<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Terminal Cheat Sheet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0c0f;
    --surface: #0f1318;
    --card: #141920;
    --border: #1e2730;
    --accent: #00ff88;
    --accent2: #00bfff;
    --accent3: #ff6b6b;
    --accent4: #ffd93d;
    --accent5: #c77dff;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #0d1117;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 80px; }

  /* Header */
  header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    position: sticky;
    top: 0;
    background: rgba(10,12,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-area h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-area h1 span { color: var(--accent); }

  .logo-area p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .stats {
    display: flex;
    gap: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .stat { color: var(--muted); }
  .stat strong { color: var(--accent); font-size: 18px; display: block; }

  /* Search */
  .search-bar {
    width: 100%;
    margin-top: 20px;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px 12px 44px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  .result-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    min-height: 16px;
  }

  /* Category filters */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

  /* Section */
  .section { margin-bottom: 40px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .section-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 2px 8px;
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Grid */
  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }

  /* Command card */
  .cmd-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .cmd-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    opacity: 0.8;
  }

  .cmd-card:hover {
    border-color: #2a3340;
    transform: translateY(-1px);
  }

  .cmd-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .cmd-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: var(--code-bg);
    padding: 4px 10px;
    border-radius: 4px;
    word-break: break-all;
    line-height: 1.5;
    flex: 1;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 10px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

  .cmd-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }

  .cmd-tag {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    opacity: 0.7;
  }

  /* Category colors */
  .cat-nav .cmd-card::before { background: #64748b; }
  .cat-files .cmd-card::before { background: var(--accent); }
  .cat-perms .cmd-card::before { background: var(--accent3); }
  .cat-proc .cmd-card::before { background: var(--accent2); }
  .cat-net .cmd-card::before { background: var(--accent4); }
  .cat-archive .cmd-card::before { background: #fb923c; }
  .cat-text .cmd-card::before { background: var(--accent5); }
  .cat-sys .cmd-card::before { background: #34d399; }
  .cat-search .cmd-card::before { background: #f472b6; }
  .cat-disk .cmd-card::before { background: #a78bfa; }
  .cat-users .cmd-card::before { background: #38bdf8; }
  .cat-ssh .cmd-card::before { background: #fb7185; }
  .cat-pkg .cmd-card::before { background: #a3e635; }
  .cat-misc .cmd-card::before { background: #fdba74; }
  .cat-sec .cmd-card::before { background: #f87171; }
  .cat-scripting .cmd-card::before { background: #818cf8; }

  /* section icon colors */
  .icon-nav { background: rgba(100,116,139,0.15); }
  .icon-files { background: rgba(0,255,136,0.1); }
  .icon-perms { background: rgba(255,107,107,0.1); }
  .icon-proc { background: rgba(0,191,255,0.1); }
  .icon-net { background: rgba(255,217,61,0.1); }
  .icon-archive { background: rgba(251,146,60,0.1); }
  .icon-text { background: rgba(199,125,255,0.1); }
  .icon-sys { background: rgba(52,211,153,0.1); }
  .icon-search { background: rgba(244,114,182,0.1); }
  .icon-disk { background: rgba(167,139,250,0.1); }
  .icon-users { background: rgba(56,189,248,0.1); }
  .icon-ssh { background: rgba(251,113,133,0.1); }
  .icon-pkg { background: rgba(163,230,53,0.1); }
  .icon-misc { background: rgba(253,186,116,0.1); }
  .icon-sec { background: rgba(248,113,113,0.1); }
  .icon-scripting { background: rgba(129,140,248,0.1); }

  /* Tag colors matching category */
  .tag-nav { background: rgba(100,116,139,0.2); color: #94a3b8; }
  .tag-files { background: rgba(0,255,136,0.1); color: var(--accent); }
  .tag-perms { background: rgba(255,107,107,0.1); color: var(--accent3); }
  .tag-proc { background: rgba(0,191,255,0.1); color: var(--accent2); }
  .tag-net { background: rgba(255,217,61,0.1); color: var(--accent4); }
  .tag-archive { background: rgba(251,146,60,0.1); color: #fb923c; }
  .tag-text { background: rgba(199,125,255,0.1); color: var(--accent5); }
  .tag-sys { background: rgba(52,211,153,0.1); color: #34d399; }
  .tag-search { background: rgba(244,114,182,0.1); color: #f472b6; }
  .tag-disk { background: rgba(167,139,250,0.1); color: #a78bfa; }
  .tag-users { background: rgba(56,189,248,0.1); color: #38bdf8; }
  .tag-ssh { background: rgba(251,113,133,0.1); color: #fb7185; }
  .tag-pkg { background: rgba(163,230,53,0.1); color: #a3e635; }
  .tag-misc { background: rgba(253,186,116,0.1); color: #fdba74; }
  .tag-sec { background: rgba(248,113,113,0.1); color: #f87171; }
  .tag-scripting { background: rgba(129,140,248,0.1); color: #818cf8; }

  .hidden { display: none !important; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: var(--bg);
    padding: 10px 18px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .cmd-grid { grid-template-columns: 1fr; }
    .header-inner { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="header-inner">
      <div class="logo-area">
        <h1>Linux Terminal <span>Cheat Sheet</span></h1>
        <p>bleak@ubuntu ~ # everything you need, nothing you don't</p>
      </div>
      <div class="stats">
        <div class="stat"><strong id="total-count">0</strong>commands</div>
        <div class="stat"><strong>16</strong>categories</div>
      </div>
    </div>
    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="search commands, flags, descriptions..." autocomplete="off" spellcheck="false">
    </div>
    <div class="result-count" id="result-count"></div>
  </header>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">All</button>
  </div>

  <div id="content"></div>
</div>

<div class="toast" id="toast">Copied!</div>

// Build UI
const content = document.getElementById('content');
const filters = document.getElementById('filters');
const searchInput = document.getElementById('search');
const resultCount = document.getElementById('result-count');
const totalCount = document.getElementById('total-count');
const toast = document.getElementById('toast');

let totalCmds = 0;
data.forEach(cat => totalCmds += cat.cmds.length);
totalCount.textContent = totalCmds;

// Build filter buttons
data.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.cat = cat.id;
  btn.textContent = cat.label;
  filters.appendChild(btn);
});

// Build sections
data.forEach(cat => {
  const section = document.createElement('div');
  section.className = `section cat-${cat.id}`;
  section.dataset.cat = cat.id;

  section.innerHTML = `
    <div class="section-header">
      <div class="section-icon ${cat.iconClass}">${cat.icon}</div>
      <span class="section-title">${cat.label}</span>
      <span class="section-count">${cat.cmds.length}</span>
    </div>
    <div class="cmd-grid">
      ${cat.cmds.map(c => `
        <div class="cmd-card" data-cat="${cat.id}" data-cmd="${escHtml(c.cmd)}" data-desc="${escHtml(c.desc)}">
          <div class="cmd-top">
            <code class="cmd-code">${escHtml(c.cmd)}</code>
            <button class="copy-btn" onclick="copyCmd(this, '${escAttr(c.cmd)}')">copy</button>
          </div>
          <div class="cmd-desc">${escHtml(c.desc)}</div>
          <span class="cmd-tag tag-${cat.id}">${cat.label}</span>
        </div>
      `).join('')}
    </div>
  `;

  content.appendChild(section);
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

// Copy
function copyCmd(btn, cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    showToast('Copied!');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// Filter
let activeFilter = 'all';

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.cat;
  applyFilter();
});

function applyFilter() {
  const query = searchInput.value.toLowerCase().trim();

  const sections = document.querySelectorAll('.section');
  let visible = 0;

  sections.forEach(sec => {
    const catMatch = activeFilter === 'all' || sec.dataset.cat === activeFilter;
    if (!catMatch) { sec.classList.add('hidden'); return; }

    const cards = sec.querySelectorAll('.cmd-card');
    let secVisible = 0;

    cards.forEach(card => {
      const cmdMatch = !query || card.dataset.cmd.toLowerCase().includes(query) || card.dataset.desc.toLowerCase().includes(query);
      if (cmdMatch) { card.classList.remove('hidden'); secVisible++; visible++; }
      else card.classList.add('hidden');
    });

    sec.classList.toggle('hidden', secVisible === 0);
  });

  if (query) {
    resultCount.textContent = `${visible} command${visible !== 1 ? 's' : ''} found for "${query}"`;
  } else {
    resultCount.textContent = '';
  }
}

searchInput.addEventListener('input', applyFilter);
